name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - run: mix deps.get
      - run: mix format --check-formatted

  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: compile-${{ hashFiles('mix.lock') }}
          restore-keys: compile-
      - run: mix deps.get
      - run: mix compile --warnings-as-errors

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: test-${{ matrix.elixir }}-${{ matrix.otp }}-
      - run: mix deps.get
      - run: mix test
